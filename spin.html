<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عجلة هدايا بلبن</title>
    <style>
        /* لضمان عدم ظهور صفحة بيضاء، وضعنا لون خلفية احتياطي */
        body, html { 
            margin: 0; padding: 0; height: 100%; overflow: hidden; 
            background-color: #f0f2f5; 
        }

        .wrapper {
            /* تأكد من رفع الصورة وتسميتها bg.jpg بجانب هذا الملف */
            background-image: url('bg.jpg'); 
            background-size: cover;
            background-position: center;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* إذا لم تتحمل الصورة، يظهر هذا المربع لكي لا تكون الصفحة بيضاء */
        .fallback-msg {
            position: absolute;
            top: 10px;
            color: #666;
            font-size: 12px;
        }

        .wheel-layer {
            position: absolute;
            width: 320px; 
            height: 320px;
            top: 45%; 
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            border-radius: 50%;
            cursor: pointer;
        }

        #actual-spin {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1);
        }

        .modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            z-index: 100;
            text-align: center;
            width: 280px;
            border: 4px solid #0866ff;
        }

        button {
            background: #0866ff; color: white; border: none;
            padding: 12px; border-radius: 10px; width: 100%;
            font-weight: bold; cursor: pointer; margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="wheel-layer">
            <div id="actual-spin" onclick="start()"></div>
        </div>
    </div>

    <div id="resModal" class="modal">
        <h2 id="mTitle">جاري السحب...</h2>
        <p id="mBody">برجاء الانتظار ثواني...</p>
        <button id="okBtn" style="display:none;" onclick="finish()">موافق</button>
    </div>

    <script>
        let done = false;
        function start() {
            if (done) return;
            done = true;
            const w = document.getElementById('actual-spin');
            w.style.transform = "rotate(3930deg)"; // يلف 10 لفات ويقف على حظ موفق

            setTimeout(() => {
                document.getElementById('resModal').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('mTitle').innerText = "حظ موفق!";
                    document.getElementById('mTitle').style.color = "red";
                    document.getElementById('mBody').innerText = "للأسف لم يحالفك الحظ اليوم، حاول غداً مع صناديق بلبن.";
                    document.getElementById('okBtn').style.display = 'block';
                }, 2000);
            }, 5000);
        }
        function finish() { window.location.href = "https://www.facebook.com"; }
    </script>
</body>
</html>
