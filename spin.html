<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عجلة الحظ - بلبن</title>
    <style>
        :root {
            --blaban-blue: #004aad;
            --gold: #d4af37;
            --white: #ffffff;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle, #0056cc 0%, #001a33 100%);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
        }

        .container { text-align: center; position: relative; }

        /* حاوية العجلة مع الإطار الخارجي */
        .wheel-wrapper {
            position: relative;
            width: 380px;
            height: 380px;
            padding: 15px;
            background: var(--gold);
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(0,0,0,0.6), inset 0 0 10px rgba(0,0,0,0.5);
            border: 4px solid #fff;
        }

        /* المؤشر (السهم) العلوي */
        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 45px;
            height: 45px;
            background: #ff0000;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 100;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.4));
        }

        canvas {
            border-radius: 50%;
            transition: transform 7s cubic-bezier(0.1, 0, 0.1, 1);
            background: #fff;
        }

        .spin-btn {
            margin-top: 40px;
            padding: 15px 60px;
            font-size: 24px;
            font-weight: bold;
            color: var(--blaban-blue);
            background: #fff;
            border: 4px solid var(--gold);
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            transition: all 0.3s;
        }

        .spin-btn:hover { transform: scale(1.1); background: var(--gold); color: #fff; }
        .spin-btn:disabled { background: #666; color: #999; cursor: not-allowed; border-color: #444; }

        /* نافذة النتيجة الاحترافية */
        .modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            z-index: 1000;
            width: 300px;
            box-shadow: 0 0 100px rgba(0,0,0,0.9);
            border-top: 10px solid var(--blaban-blue);
        }

        .modal button {
            background: var(--blaban-blue);
            color: white; border: none; padding: 12px;
            border-radius: 10px; width: 100%; cursor: pointer;
            font-weight: bold; font-size: 18px; margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="wheel-wrapper">
            <div class="pointer"></div>
            <canvas id="wheelCanvas" width="380" height="380"></canvas>
        </div>
        <button class="spin-btn" id="spinBtn" onclick="executeSpin()">لف العجلة واربح!</button>
    </div>

    <div id="resultModal" class="modal">
        <h2 style="color: #d63031;">حظ موفق!</h2>
        <p style="color: #333; line-height: 1.6;">للأسف لم تربح في هذه المحاولة. حاول مرة أخرى غداً مع عروض بلبن "عفاريت الأسفلت".</p>
        <button onclick="redirect()">موافق</button>
    </div>

    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const items = [
            { label: "عفاريت 1", color: "#004aad" },
            { label: "حظ موفق", color: "#ffffff" },
            { label: "السبيكة", color: "#d4af37" },
            { label: "عفاريت 2", color: "#004aad" },
            { label: "حظ موفق", color: "#ffffff" },
            { label: "السبيكة", color: "#d4af37" },
            { label: "عفاريت 3", color: "#004aad" },
            { label: "حظ موفق", color: "#ffffff" }
        ];

        const numSectors = items.length;
        const anglePerSector = (Math.PI * 2) / numSectors;

        function draw() {
            ctx.clearRect(0, 0, 380, 380);
            items.forEach((item, i) => {
                const angle = i * anglePerSector;
                
                // رسم القطاع
                ctx.beginPath();
                ctx.fillStyle = item.color;
                ctx.moveTo(190, 190);
                ctx.arc(190, 190, 190, angle, angle + anglePerSector);
                ctx.fill();
                ctx.strokeStyle = "#fff";
                ctx.lineWidth = 2;
                ctx.stroke();

                // رسم النص
                ctx.save();
                ctx.translate(190, 190);
                ctx.rotate(angle + anglePerSector / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = item.color === "#ffffff" ? "#004aad" : "#fff";
                ctx.font = "bold 18px Arial";
                ctx.fillText(item.label, 170, 8);
                ctx.restore();
            });

            // إضافة دائرة مركزية جمالية
            ctx.beginPath();
            ctx.arc(190, 190, 25, 0, Math.PI * 2);
            ctx.fillStyle = "#fff";
            ctx.fill();
            ctx.strokeStyle = "#d4af37";
            ctx.lineWidth = 5;
            ctx.stroke();
        }

        draw();

        let currentRotation = 0;
        function executeSpin() {
            const btn = document.getElementById('spinBtn');
            btn.disabled = true;

            // حساب زاوية الوقوف على "حظ موفق" دائماً
            // لفة كاملة (360 * 10) + إزاحة محددة
            const extraDegrees = 3600 + 45; 
            currentRotation += extraDegrees;
            
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                document.getElementById('resultModal').style.display = 'block';
            }, 7500);
        }

        function redirect() {
            window.location.href = "https://www.facebook.com";
        }
    </script>
</body>
</html>
