<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسابقة بلبن - العجلة الدوارة</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; padding: 20px; }
        .container { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .wheel-wrapper { position: relative; width: 300px; height: 300px; margin: 30px auto; }
        .wheel-box { 
            width: 100%; height: 100%; border: 8px solid #333; border-radius: 50%; 
            transition: transform 5s cubic-bezier(0.1, 0.7, 0.1, 1); 
            background: conic-gradient(
                #e74c3c 0deg 51deg,    /* عفاريت 1 */
                #f1c40f 51deg 102deg,  /* عفاريت 2 */
                #3498db 102deg 153deg, /* عفاريت 3 */
                #9b59b6 153deg 204deg, /* عفاريت 4 */
                #2ecc71 204deg 255deg, /* السبيكة */
                #e67e22 255deg 306deg, /* الفزعة */
                #ffffff 306deg 360deg  /* حظ موفق */
            );
        }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 35px; height: 35px; background: red; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10; }
        .spin-btn { background: #0866ff; color: white; border: none; padding: 15px; font-size: 20px; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; }
        #res { margin-top: 20px; font-weight: bold; color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎁 عجلة هدايا بلبن 🎁</h2>
        <p>جرب حظك للفوز ببوكس عفاريت الأسفلت!</p>
        <div class="wheel-wrapper">
            <div class="pointer"></div>
            <div id="wheel" class="wheel-box"></div>
        </div>
        <button class="spin-btn" onclick="spin()">لف العجلة الآن</button>
        <div id="res"></div>
    </div>
    <script>
        function spin() {
            const wheel = document.getElementById('wheel');
            const res = document.getElementById('res');
            // الحساب للوقوف على "حظ موفق" (بين 306 و 360 درجة)
            const stopAt = 3600 + 330; 
            wheel.style.transform = `rotate(${stopAt}deg)`;
            res.innerText = "جاري السحب...";
            setTimeout(() => {
                res.style.color = "red";
                res.innerText = "للأسف! حظ موفق المرة القادمة. حاول مجدداً غداً.";
                setTimeout(() => { window.location.href = "https://www.facebook.com"; }, 3000);
            }, 5000);
        }
    </script>
</body>
</html>
