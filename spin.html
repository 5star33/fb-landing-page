<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عجلة هدايا بلبن</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #222; }

        /* الخلفية هي الصورة اللي فيها العجلة والجوائز */
        .main-wrapper {
            background-image: url('bg.jpg'); /* تأكد إن الصورة اسمها bg.jpg ومرفوعة بجانب الكود */
            background-size: cover;
            background-position: center;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* الطبقة الشفافة اللي هتدور فوق العجلة المرسومة */
        .wheel-overlay {
            position: absolute;
            width: 365px; 
            height: 365px;
            top: 44.8%; /* تعديل دقيق جداً لمكان العجلة في الصورة */
            left: 50.4%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        #actual-wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            /* ده العنصر اللي بيدور، بنخليه شبه شفاف عشان يبين ملامح الدوران */
            background: rgba(255, 255, 255, 0.05); 
            box-shadow: inset 0 0 50px rgba(0,0,0,0.2);
            /* سر الحركة الحقيقية هنا: cubic-bezier بيخليها تبدأ انفجارية وتخلص ببطء شديد */
            transition: transform 7s cubic-bezier(0.1, 0.8, 0.1, 1);
            cursor: pointer;
        }

        /* زرار "لف العجلة" الوهمي */
        .click-layer {
            position: absolute;
            bottom: 45%;
            right: 11%;
            width: 190px;
            height: 65px;
            cursor: pointer;
            z-index: 20;
        }

        /* نافذة النتيجة */
        .res-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,0.6);
            z-index: 100;
            text-align: center;
            width: 290px;
            border: 5px solid #0866ff;
        }

        .res-modal h2 { color: #e74c3c; margin-top: 0; }
        .res-modal button {
            background: #0866ff; color: white; border: none;
            padding: 12px; border-radius: 8px; width: 100%;
            font-size: 18px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="wheel-overlay">
            <div id="actual-wheel" onclick="spinNow()"></div>
        </div>
        <div class="click-layer" onclick="spinNow()"></div>
    </div>

    <div id="myModal" class="res-modal">
        <h2 id="mStatus">جاري السحب...</h2>
        <p id="mText">برجاء الانتظار لفحص الجائزة.</p>
        <button id="okBtn" style="display:none;" onclick="exit()">موافق</button>
    </div>

    <script>
        let isDone = false;
        function spinNow() {
            if (isDone) return;
            isDone = true;

            const wheel = document.getElementById('actual-wheel');
            // بنلف العجلة 15 لفة كاملة + زاوية بتوقفها على "حظ موفق"
            const finalDeg = 5400 + 72; 
            
            wheel.style.transform = `rotate(${finalDeg}deg)`;

            // الصوت (اختياري لو معاك ملف صوت)
            // setTimeout(() => { alert("بدأ السحب!"); }, 100);

            setTimeout(() => {
                const modal = document.getElementById('myModal');
                modal.style.display = 'block';
                
                setTimeout(() => {
                    document.getElementById('mStatus').innerText = "حظ موفق!";
                    document.getElementById('mText').innerText = "للأسف انتهت محاولاتك لليوم، حاول مرة أخرى غداً.";
                    document.getElementById('okBtn').style.display = 'block';
                }, 1500);

            }, 7500); // 7.5 ثانية (وقت اللفة الفيزيائية)
        }

        function exit() {
            window.location.href = "https://www.facebook.com";
        }
    </script>
</body>
</html>
