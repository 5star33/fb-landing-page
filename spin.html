<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عجلة الحظ - بلبن</title>
    <style>
        :root {
            --primary-blue: #004aad;
            --gold: #d4af37;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: radial-gradient(circle, #0056cc 0%, #002d66 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 { margin: 0; font-size: 28px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }

        /* حاوية العجلة */
        .wheel-box {
            position: relative;
            width: 350px;
            height: 350px;
            border: 10px solid #fff;
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.2);
        }

        /* المؤشر (السهم) */
        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            background: #ff0000;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 100;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        canvas {
            display: block;
            border-radius: 50%;
            transition: transform 6s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .spin-btn {
            margin-top: 30px;
            padding: 15px 50px;
            font-size: 22px;
            font-weight: bold;
            color: var(--primary-blue);
            background: #fff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .spin-btn:hover { transform: scale(1.05); background: #f0f0f0; }
        .spin-btn:disabled { background: #ccc; cursor: not-allowed; }

        /* النافذة المنبثقة */
        .modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            z-index: 1000;
            width: 280px;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
        }

        .modal button {
            background: var(--primary-blue);
            color: white; border: none; padding: 12px 30px;
            border-radius: 8px; margin-top: 20px; cursor: pointer;
            font-weight: bold; width: 100%;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>عجلة هدايا بلبن 🎁</h1>
        <p>اضغط على الزر لتجربة حظك</p>
    </div>

    <div
