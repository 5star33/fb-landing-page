<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B.Laban Lucky Wheel - عجلة الحظ من بلبن</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            direction: rtl;
        }

        /* حاوية الصفحة الرئيسية */
        .page-container {
            display: flex;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.1);
            overflow: hidden;
            width: 900px;
            max-width: 95%;
            height: 600px;
        }

        /* القسم الأيمن (لوحة التحكم والتعليمات) */
        .control-panel {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-left: 1px solid #eee;
        }

        .brand-header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }

        .brand-logo {
            width: 50px;
            height: 50px;
            background: #0866ff;
            color: white;
            font-weight: bold;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            margin-left: 15px;
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin: 0;
        }

        p.description {
            color: #666;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .spin-button {
            background: #42b72a;
            color: white;
            border: none;
            padding: 18px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            width: 100%;
        }

        .spin-button:hover {
            background: #36a420;
        }

        .spin-button:active {
            transform: scale(0.98);
        }

        .spin-button:disabled {
            background: #a5d6a7;
            cursor: not-allowed;
        }

        /* القسم الأيسر (العجلة الدوارة) */
        .wheel-panel {
            flex: 1.5;
            background: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 20px;
        }

        /* حاوية العجلة */
        .wheel-outer {
            position: relative;
            width: 450px;
            height: 450px;
            border-radius: 50%;
            border: 15px solid #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
