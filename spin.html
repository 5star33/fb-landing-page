<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عجلة هدايا بلبن - عفاريت الأسفلت</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; }

        /* حاوية الخلفية (الصورة التي صممناها) */
        .wrapper {
            background-image: url('https://googleusercontent.com/image_generation_content/5'); 
            background-size: cover;
            background-position: center;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* الطبقة الشفافة التي تدور فوق العجلة المرسومة */
        .wheel-layer {
            position: absolute;
            width: 380px; /* مقاس العجلة في الصورة */
            height: 380px;
            top: 45%; 
            left: 50.5%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        #actual-spin-element {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            /* نستخدم خلفية شفافة جداً لإعطاء تأثير حركي عند الدوران */
            background: rgba(255, 255, 255, 0.03);
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            cursor: pointer;
        }

        /* زر وهمي فوق منطقة "لف العجلة" في الصورة */
        .invisible-btn {
            position: absolute;
            bottom: 45%;
            right: 11%;
            width: 190px;
            height: 65px;
            cursor: pointer;
            z-index: 20;
        }

        /* نافذة النتيجة (Popup) */
        .modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            z-index: 100;
            text-align: center;
            width: 280px;
            border: 4px solid #0866ff;
        }

        .modal h2 { color: #d63031; margin-top: 0; }
        .modal button {
            background: #0866ff; color: white; border: none;
            padding: 12px; border-radius: 10px; width: 100%;
            font-weight: bold; cursor: pointer; margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="wheel-layer">
            <div id="actual-spin-element" onclick="startSpinning()"></div>
        </div>

        <div class="invisible-btn" onclick="startSpinning()"></div>
    </div>

    <div id="resultModal" class="modal">
        <h2 id="modalTitle">جاري سحب الجائزة...</h2>
        <p id="modalBody">برجاء عدم إغلاق الصفحة لضمان تسجيل عرضك.</p>
        <button id="finalBtn" style="display:none;" onclick="finish()">موافق</button>
    </div>

    <script>
        let hasPlayed = false;

        function startSpinning() {
            if (hasPlayed) return; // لفة واحدة فقط
            hasPlayed = true;

            const wheel = document.getElementById('actual-spin-element');
            // لفة سريعة (مثلاً 10 دورات كاملة + زاوية عشوائية)
            const deg = 3600 + (Math.random() * 360); 
            wheel.style.transform = `rotate(${deg}deg)`;

            // إظهار النتيجة بعد توقف العجلة
            setTimeout(() => {
                const modal = document.getElementById('resultModal');
                modal.style.display = 'block';
                
                setTimeout(() => {
                    document.getElementById('modalTitle').innerText = "حظ موفق!";
                    document.getElementById('modalBody').innerText = "للأسف انتهت محاولاتك لليوم. حاول غداً للفوز ببوكس عفاريت الأسفلت المفضل لديك!";
                    document.getElementById('finalBtn').style.display = 'block';
                }, 2000);

            }, 5000);
        }

        function finish() {
            window.location.href = "https://www.facebook.com";
        }
    </script>

</body>
</html>
