<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسابقة بلبن - عفاريت الأسفلت</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: sans-serif;
        }

        /* الخلفية هي الصورة اللي اخترتها */
        .bg-container {
            background-image: url('https://googleusercontent.com/image_generation_content/2'); 
            background-size: cover;
            background-position: center;
            height: 100vh;
            width: 100vw;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* منطقة ضغط العجلة (فوق الرسمة بالضبط) */
        .wheel-area {
            position: absolute;
            width: 350px; /* حجم العجلة في الصورة */
            height: 350px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            /* خليناها شفافة عشان تضغط على العجلة اللي في الصورة */
            background: rgba(255, 255, 255, 0); 
        }

        /* زرار وهمي شفاف فوق كلمة "لف العجلة" في الصورة */
        .spin-trigger {
            position: absolute;
            bottom: 35%; 
            right: 15%;
            width: 200px;
            height: 60px;
            cursor: pointer;
            z-index: 15;
        }

        /* رسالة النتيجة اللي هتظهر */
        #status-popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            z-index: 100;
            text-align: center;
            width: 80%;
            max-width: 300px;
        }

        .ok-btn {
            background: #0866ff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            margin-top: 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="bg-container">
        <div class="wheel-area" onclick="startSpin()"></div>
        <div class="spin-trigger" onclick="startSpin()"></div>
    </div>

    <div id="status-popup">
        <h3 id="res-title">جاري السحب...</h3>
        <p id="res-body">يرجى الانتظار ثواني...</p>
        <button class="ok-btn" onclick="goToFb()">موافق</button>
    </div>

    <script>
        function startSpin() {
            const popup = document.getElementById('status-popup');
            const title = document.getElementById('res-title');
            const body = document.getElementById('res-body');
            
            popup.style.display = 'block';
            
            setTimeout(() => {
                title.innerText = "حظ موفق!";
                title.style.color = "red";
                body.innerText = "للأسف لم تربح هذه المرة، حاول مجدداً غداً مع صناديق بلبن.";
            }, 3000);
        }

        function goToFb() {
            window.location.href = "https://www.facebook.com";
        }
    </script>

</body>
</html>
